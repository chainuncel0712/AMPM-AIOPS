<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#f7c948"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="16" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.05" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="100" y1="0" x2="100" y2="280"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="500" y1="0" x2="500" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="700" y1="0" x2="700" y2="280"/>
  </g>

  <!-- Robot face -->
  <g transform="translate(60, 40)">
    <!-- Head -->
    <rect x="0" y="0" width="120" height="100" rx="12" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <!-- Eyes -->
    <circle cx="35" cy="40" r="10" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="85" cy="40" r="10" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="35" cy="40" r="4" fill="#00d4ff" opacity="0.8"/>
    <circle cx="85" cy="40" r="4" fill="#00d4ff" opacity="0.8"/>
    <!-- Mouth -->
    <rect x="30" y="65" width="60" height="6" rx="3" fill="url(#accent)"/>
    <!-- Antenna -->
    <line x1="60" y1="0" x2="60" y2="-20" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="60" cy="-24" r="5" fill="#00d4ff" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="210" y="75" font-family="monospace" font-size="32" font-weight="bold" fill="url(#accent)">AI-BOS</text>
  <text x="210" y="105" font-family="monospace" font-size="14" fill="#888">Artificial Intelligence Body Operating System</text>

  <!-- Tags -->
  <g transform="translate(210, 125)">
    <rect x="0" y="0" width="90" height="22" rx="11" fill="none" stroke="#00d4ff" stroke-width="1.2"/>
    <text x="45" y="15" font-family="monospace" font-size="11" fill="#00d4ff" text-anchor="middle">v1.0.0</text>

    <rect x="100" y="0" width="100" height="22" rx="11" fill="none" stroke="#7b2ff7" stroke-width="1.2"/>
    <text x="150" y="15" font-family="monospace" font-size="11" fill="#7b2ff7" text-anchor="middle">54+ 器官</text>

    <rect x="210" y="0" width="90" height="22" rx="11" fill="none" stroke="#f7c948" stroke-width="1.2"/>
    <text x="255" y="15" font-family="monospace" font-size="11" fill="#f7c948" text-anchor="middle">自我進化</text>
  </g>

  <!-- Bottom features -->
  <g transform="translate(0, 220)">
    <line x1="30" y1="0" x2="770" y2="0" stroke="url(#accent)" stroke-width="0.5" opacity="0.3"/>

    <g transform="translate(40, 15)">
      <circle cx="8" cy="8" r="4" fill="#00d4ff" opacity="0.6"/>
      <text x="18" y="12" font-family="monospace" font-size="12" fill="#666">🧠 處理器</text>
    </g>
    <g transform="translate(160, 15)">
      <circle cx="8" cy="8" r="4" fill="#7b2ff7" opacity="0.6"/>
      <text x="18" y="12" font-family="monospace" font-size="12" fill="#666">💾 記憶庫</text>
    </g>
    <g transform="translate(280, 15)">
      <circle cx="8" cy="8" r="4" fill="#ff6b35" opacity="0.6"/>
      <text x="18" y="12" font-family="monospace" font-size="12" fill="#666">🛡️ 裝甲</text>
    </g>
    <g transform="translate(400, 15)">
      <circle cx="8" cy="8" r="4" fill="#00d4ff" opacity="0.6"/>
      <text x="18" y="12" font-family="monospace" font-size="12" fill="#666">💪 制動器</text>
    </g>
    <g transform="translate(530, 15)">
      <circle cx="8" cy="8" r="4" fill="#f7c948" opacity="0.6"/>
      <text x="18" y="12" font-family="monospace" font-size="12" fill="#666">🧬 升級艙</text>
    </g>
    <g transform="translate(660, 15)">
      <circle cx="8" cy="8" r="4" fill="#ff6b35" opacity="0.6"/>
      <text x="18" y="12" font-family="monospace" font-size="12" fill="#666">🔧 維修站</text>
    </g>
  </g>

  <!-- Decorative circuit lines -->
  <g opacity="0.15" stroke="#00d4ff" stroke-width="1" fill="none">
    <path d="M 30 180 L 50 180 L 55 170 L 65 190 L 75 170 L 80 180 L 100 180"/>
    <path d="M 700 180 L 720 180 L 725 170 L 735 190 L 745 170 L 750 180 L 770 180"/>
  </g>
</svg>
