<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" width="800" height="700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#12121e"/>
    </linearGradient>
    <linearGradient id="coreLayer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="organLayer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="lifeLayer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d1b69"/>
    </linearGradient>
    <linearGradient id="execLayer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="boxShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="700" fill="url(#bg)" rx="8"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" fill="#00d4ff" filter="url(#glow)" letter-spacing="3">ARCHITECTURE</text>
  <line x1="280" y1="52" x2="520" y2="52" stroke="#7c3aed" stroke-width="0.5" opacity="0.4"/>

  <!-- ============= EXECUTOR LAYER (top) ============= -->
  <g transform="translate(0, 70)">
    <rect x="50" y="0" width="700" height="130" rx="8" fill="url(#execLayer)" stroke="#00d4ff" stroke-width="0.8" opacity="0.3" filter="url(#boxShadow)"/>
    <text x="70" y="25" font-family="'Courier New', monospace" font-size="14" fill="#00d4ff" filter="url(#glow)" letter-spacing="2">EXECUTOR</text>

    <!-- Orchestrator -->
    <rect x="100" y="40" width="160" height="36" rx="4" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <text x="180" y="63" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#00d4ff" opacity="0.8">Orchestrator</text>

    <!-- Arrow -->
    <line x1="260" y1="58" x2="290" y2="58" stroke="#00d4ff" stroke-width="1" opacity="0.4"/>
    <polygon points="290,53 300,58 290,63" fill="#00d4ff" opacity="0.4"/>

    <!-- Reflect -->
    <rect x="300" y="40" width="140" height="36" rx="4" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <text x="370" y="63" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#00d4ff" opacity="0.8">Reflect</text>

    <!-- Down arrow to Repair -->
    <line x1="370" y1="76" x2="370" y2="125" stroke="#7c3aed" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
    <polygon points="365,120 370,130 375,120" fill="#7c3aed" opacity="0.5"/>

    <!-- Repair (commercial) -->
    <rect x="300" y="90" width="140" height="30" rx="4" fill="none" stroke="#7c3aed" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>
    <text x="370" y="109" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed" opacity="0.6">Repair *</text>

    <!-- Arrow Repair -> Evolve -->
    <line x1="440" y1="105" x2="470" y2="105" stroke="#7c3aed" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.4"/>
    <polygon points="470,100 480,105 470,110" fill="#7c3aed" opacity="0.4"/>

    <!-- Evolve (commercial) -->
    <rect x="480" y="90" width="140" height="30" rx="4" fill="none" stroke="#7c3aed" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>
    <text x="550" y="109" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed" opacity="0.6">Evolve *</text>

    <!-- Right side: Tools -->
    <rect x="580" y="40" width="140" height="80" rx="4" fill="none" stroke="#00d4ff" stroke-width="0.6" opacity="0.4"/>
    <text x="650" y="80" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#00d4ff" opacity="0.7">Tools</text>

    <!-- Arrow to Tools -->
    <line x1="440" y1="58" x2="580" y2="58" stroke="#00d4ff" stroke-width="0.6" opacity="0.3"/>
    <polygon points="575,53 585,58 575,63" fill="#00d4ff" opacity="0.3"/>
  </g>

  <!-- Connection arrow between layers -->
  <line x1="400" y1="200" x2="400" y2="225" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
  <polygon points="395,222 400,232 405,222" fill="#00d4ff" opacity="0.3"/>

  <!-- ============= LIFECYCLE LAYER ============= -->
  <g transform="translate(0, 235)">
    <rect x="50" y="0" width="700" height="130" rx="8" fill="url(#lifeLayer)" stroke="#7c3aed" stroke-width="0.8" opacity="0.3" filter="url(#boxShadow)"/>
    <text x="70" y="25" font-family="'Courier New', monospace" font-size="14" fill="#7c3aed" filter="url(#glow)" letter-spacing="2">LIFECYCLE</text>

    <!-- Boot -->
    <rect x="80" y="45" width="100" height="36" rx="4" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
    <text x="130" y="68" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7c3aed" opacity="0.8">Boot</text>

    <line x1="180" y1="63" x2="210" y2="63" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
    <polygon points="210,58 220,63 210,68" fill="#7c3aed" opacity="0.4"/>

    <!-- Baseline Test -->
    <rect x="220" y="45" width="120" height="36" rx="4" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
    <text x="280" y="68" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7c3aed" opacity="0.8">Baseline Test</text>

    <line x1="340" y1="63" x2="370" y2="63" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
    <polygon points="370,58 380,63 370,68" fill="#7c3aed" opacity="0.4"/>

    <!-- Runtime -->
    <rect x="380" y="45" width="110" height="36" rx="4" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
    <text x="435" y="68" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#7c3aed" opacity="0.8">Runtime</text>

    <!-- Bidirectional arrow to Health -->
    <line x1="490" y1="63" x2="520" y2="63" stroke="#7c3aed" stroke-width="0.8" opacity="0.4"/>
    <polygon points="490,58 490,68" fill="#7c3aed" opacity="0.4"/>
    <polygon points="520,58 520,68" fill="#7c3aed" opacity="0.4"/>
    <line x1="490" y1="58" x2="520" y2="58" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
    <line x1="490" y1="68" x2="520" y2="68" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>

    <!-- Health Loop -->
    <rect x="530" y="45" width="110" height="36" rx="4" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
    <text x="585" y="68" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#7c3aed" opacity="0.8">Health Loop</text>

    <!-- Shutdown -->
    <rect x="530" y="90" width="110" height="30" rx="4" fill="none" stroke="#7c3aed" stroke-width="0.6" opacity="0.4"/>
    <text x="585" y="109" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#7c3aed" opacity="0.5">Shutdown</text>
    <line x1="585" y1="81" x2="585" y2="90" stroke="#7c3aed" stroke-width="0.6" opacity="0.3"/>
  </g>

  <!-- Connection arrow between layers -->
  <line x1="400" y1="365" x2="400" y2="390" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
  <polygon points="395,387 400,397 405,387" fill="#7c3aed" opacity="0.3"/>

  <!-- ============= ORGANS LAYER ============= -->
  <g transform="translate(0, 400)">
    <rect x="50" y="0" width="700" height="130" rx="8" fill="url(#organLayer)" stroke="#00d4ff" stroke-width="0.8" opacity="0.3" filter="url(#boxShadow)"/>
    <text x="70" y="25" font-family="'Courier New', monospace" font-size="14" fill="#00d4ff" filter="url(#glow)" letter-spacing="2">ORGANS</text>

    <!-- Brain -->
    <rect x="80" y="45" width="130" height="36" rx="4" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <text x="145" y="68" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#00d4ff" opacity="0.8">🧠 Brain</text>

    <!-- Memory -->
    <rect x="235" y="45" width="130" height="36" rx="4" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <text x="300" y="68" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#00d4ff" opacity="0.8">💾 Memory</text>

    <!-- Tools -->
    <rect x="390" y="45" width="130" height="36" rx="4" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <text x="455" y="68" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#00d4ff" opacity="0.8">🔧 Tools</text>

    <!-- Registry -->
    <rect x="545" y="45" width="150" height="36" rx="4" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <text x="620" y="68" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#00d4ff" opacity="0.8">📋 Registry</text>

    <!-- Commercial organs row -->
    <rect x="100" y="92" width="120" height="28" rx="4" fill="none" stroke="#7c3aed" stroke-width="0.6" stroke-dasharray="4,3" opacity="0.4"/>
    <text x="160" y="111" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7c3aed" opacity="0.5">🛡️ Immune *</text>

    <rect x="250" y="92" width="120" height="28" rx="4" fill="none" stroke="#7c3aed" stroke-width="0.6" stroke-dasharray="4,3" opacity="0.4"/>
    <text x="310" y="111" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7c3aed" opacity="0.5">⚖️ Governance *</text>

    <rect x="400" y="92" width="130" height="28" rx="4" fill="none" stroke="#7c3aed" stroke-width="0.6" stroke-dasharray="4,3" opacity="0.4"/>
    <text x="465" y="111" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7c3aed" opacity="0.5">🔄 Evolution *</text>

    <rect x="560" y="92" width="120" height="28" rx="4" fill="none" stroke="#7c3aed" stroke-width="0.6" stroke-dasharray="4,3" opacity="0.4"/>
    <text x="620" y="111" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7c3aed" opacity="0.5">🏛️ Civ Memory *</text>
  </g>

  <!-- Connection arrow between layers -->
  <line x1="400" y1="530" x2="400" y2="555" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
  <polygon points="395,552 400,562 405,552" fill="#00d4ff" opacity="0.3"/>

  <!-- ============= CORE LAYER (bottom) ============= -->
  <g transform="translate(0, 565)">
    <rect x="50" y="0" width="700" height="110" rx="8" fill="url(#coreLayer)" stroke="#00d4ff" stroke-width="0.8" opacity="0.3" filter="url(#boxShadow)"/>
    <text x="70" y="25" font-family="'Courier New', monospace" font-size="14" fill="#00d4ff" filter="url(#glow)" letter-spacing="2">CORE</text>

    <!-- Kernel -->
    <rect x="100" y="45" width="160" height="40" rx="4" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
    <text x="180" y="70" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#00d4ff" opacity="0.9">Kernel</text>

    <!-- Config -->
    <rect x="310" y="45" width="160" height="40" rx="4" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
    <text x="390" y="70" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#00d4ff" opacity="0.9">Config</text>

    <!-- Context -->
    <rect x="520" y="45" width="160" height="40" rx="4" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
    <text x="600" y="70" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#00d4ff" opacity="0.9">Context</text>
  </g>

  <!-- Footer legend -->
  <text x="400" y="680" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#7c3aed" opacity="0.4">* 商業版功能</text>
</svg>
