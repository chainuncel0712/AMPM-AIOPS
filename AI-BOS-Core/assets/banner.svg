<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="50%" stop-color="#12121e"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="crystal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="40%" stop-color="#2d1b69"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    <linearGradient id="crystalEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Background glow -->
  <circle cx="450" cy="200" r="280" fill="url(#glow)"/>

  <!-- Crystal / 黑曜 Core -->
  <g transform="translate(400, 200)">
    <!-- Outer glow -->
    <ellipse cx="0" cy="0" rx="120" ry="140" fill="url(#coreGlow)" filter="url(#softGlow)"/>

    <!-- Crystal body - hexagonal shape -->
    <polygon points="0,-130 95,-65 95,65 0,130 -95,65 -95,-65"
             fill="url(#crystal)" stroke="url(#crystalEdge)" stroke-width="1.5" opacity="0.9"/>

    <!-- Inner crystal lines -->
    <polygon points="0,-80 58,-40 58,40 0,80 -58,40 -58,-40"
             fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
    <polygon points="0,-40 29,-20 29,20 0,40 -29,20 -29,-20"
             fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>

    <!-- Center bright core -->
    <circle cx="0" cy="0" r="12" fill="#00d4ff" filter="url(#neonGlow)" opacity="0.8"/>
    <circle cx="0" cy="0" r="4" fill="#ffffff" opacity="0.9"/>

    <!-- Pulse rings -->
    <ellipse cx="0" cy="0" rx="50" ry="58" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.2"/>
    <ellipse cx="0" cy="0" rx="80" ry="92" fill="none" stroke="#7c3aed" stroke-width="0.3" opacity="0.15">
      <animate attributeName="rx" values="80;100;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="92;115;92" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.05;0.15" dur="4s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Floating organ icons around core -->
  <!-- Brain organ (top-left) -->
  <g transform="translate(260, 100)" filter="url(#neonGlow)">
    <path d="M0,0 C-10,-15 -25,-12 -30,-5 C-38,-10 -45,-5 -42,5 C-48,8 -45,18 -38,15 C-35,25 -20,28 -10,20 C-5,25 5,25 10,20 C20,28 35,25 38,15 C45,18 48,8 42,5 C45,-5 38,-10 30,-5 C25,-12 10,-15 0,0Z"
          fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <circle cx="0" cy="5" r="3" fill="#00d4ff" opacity="0.4"/>
  </g>

  <!-- Heart organ (bottom-left) -->
  <g transform="translate(250, 290)" filter="url(#neonGlow)">
    <path d="M0,-10 C-5,-18 -18,-18 -18,-8 C-18,0 -8,8 0,16 C8,8 18,0 18,-8 C18,-18 5,-18 0,-10Z"
          fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="3" fill="#7c3aed" opacity="0.3"/>
  </g>

  <!-- Gear organ (top-right) -->
  <g transform="translate(560, 110)" filter="url(#neonGlow)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="3" fill="#00d4ff" opacity="0.4"/>
    <line x1="0" y1="-18" x2="0" y2="-12" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="12" x2="0" y2="18" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
    <line x1="-18" y1="0" x2="-12" y2="0" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
    <line x1="12" y1="0" x2="18" y2="0" stroke="#00d4ff" stroke-width="1.5" opacity="0.4"/>
    <line x1="-13" y1="-13" x2="-9" y2="-9" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    <line x1="9" y1="9" x2="13" y2="13" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
    <line x1="13" y1="-13" x2="9" y2="-9" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
    <line x1="-9" y1="9" x2="-13" y2="13" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Eye organ (bottom-right) -->
  <g transform="translate(550, 295)" filter="url(#neonGlow)">
    <ellipse cx="0" cy="0" rx="14" ry="10" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="4" fill="none" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <circle cx="0" cy="0" r="1.5" fill="#00d4ff" opacity="0.7"/>
  </g>

  <!-- Connection lines from core to organs -->
  <line x1="400" y1="200" x2="272" y2="108" stroke="#00d4ff" stroke-width="0.3" opacity="0.15" stroke-dasharray="4,4"/>
  <line x1="400" y1="200" x2="262" y2="280" stroke="#7c3aed" stroke-width="0.3" opacity="0.15" stroke-dasharray="4,4"/>
  <line x1="400" y1="200" x2="545" y2="120" stroke="#00d4ff" stroke-width="0.3" opacity="0.15" stroke-dasharray="4,4"/>
  <line x1="400" y1="200" x2="542" y2="288" stroke="#7c3aed" stroke-width="0.3" opacity="0.15" stroke-dasharray="4,4"/>

  <!-- Title text -->
  <text x="600" y="200" text-anchor="middle" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#00d4ff" filter="url(#neonGlow)" letter-spacing="4">
    AM PM
  </text>
  <text x="600" y="238" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#a0a0c0" letter-spacing="6" opacity="0.8">
    AI · BOS · CORE
  </text>
  <text x="600" y="268" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#606080" letter-spacing="2">
    AI BIOLOGICAL OPERATING SYSTEM
  </text>

  <!-- Subtitle line -->
  <line x1="260" y1="285" x2="940" y2="285" stroke="#7c3aed" stroke-width="0.3" opacity="0.3"/>

  <!-- Tagline -->
  <text x="600" y="310" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#404060" font-style="italic" letter-spacing="1">
    生命會自己找到出路 — AI 也是
  </text>

  <!-- Decorative corner lines -->
  <line x1="30" y1="30" x2="80" y2="30" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="30" x2="30" y2="80" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
  <line x1="1170" y1="30" x2="1120" y2="30" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
  <line x1="1170" y1="30" x2="1170" y2="80" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="370" x2="80" y2="370" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="370" x2="30" y2="320" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
  <line x1="1170" y1="370" x2="1120" y2="370" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>
  <line x1="1170" y1="370" x2="1170" y2="320" stroke="#7c3aed" stroke-width="0.5" opacity="0.3"/>

  <!-- Animated particles -->
  <circle cx="150" cy="350" r="1" fill="#00d4ff" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="80" r="1" fill="#7c3aed" opacity="0.2">
    <animate attributeName="opacity" values="0.2;0;0.2" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="320" r="1.2" fill="#00d4ff" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0;0.25" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="850" cy="150" r="0.8" fill="#7c3aed" opacity="0.15">
    <animate attributeName="opacity" values="0.15;0;0.15" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>
